name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create draft release'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native dependencies for Electron
        run: |
          npm install --save-dev @electron/rebuild
          npx @electron/rebuild -f -w better-sqlite3
        env:
          ELECTRON_VERSION: '41.1.1'

      - name: Build application
        run: npm run build

      - name: Build Electron app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.github_token }}

      - name: Upload artifacts (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.nsis*.zip
          retention-days: 5
          if-no-files-found: warn

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
          retention-days: 5
          if-no-files-found: warn

      - name: Upload artifacts (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.snap
          retention-days: 5
          if-no-files-found: warn

      - name: Upload auto-update metadata
        uses: actions/upload-artifact@v4
        with:
          name: auto-update-metadata-${{ matrix.os }}
          path: |
            dist/latest*.yml
            dist/latest*.json
          retention-days: 5
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux

      - name: Download auto-update metadata
        uses: actions/download-artifact@v4
        with:
          pattern: auto-update-metadata-*
          path: artifacts/metadata
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "Windows artifacts:"
          ls -la artifacts/windows/ || echo "No Windows artifacts"
          echo "macOS artifacts:"
          ls -la artifacts/macos/ || echo "No macOS artifacts"
          echo "Linux artifacts:"
          ls -la artifacts/linux/ || echo "No Linux artifacts"
          echo "Auto-update metadata:"
          ls -la artifacts/metadata/ || echo "No metadata"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || true }}
          generate_release_notes: true
          files: |
            artifacts/windows/*
            artifacts/macos/*
            artifacts/linux/*
            artifacts/metadata/*
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}